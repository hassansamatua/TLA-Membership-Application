<!DOCTYPE html>
<html>
<head>
    <title>Debug Payment Issue</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin: 10px 0; padding: 10px; background: #f8f9fa; border: 1px solid #dee2e6; }
        .error { background: #f8d7da; border-color: #f5c6cb; color: #721c24; }
        .success { background: #d4edda; border-color: #c3e6cb; color: #155724; }
    </style>
</head>
<body>
    <h1>Debug Payment Issue</h1>
    <p>This page will help debug the payment activation issue.</p>
    
    <div>
        <h2>Step 1: Create Test Payment</h2>
        <button onclick="createTestPayment()">Create Test Payment</button>
        <div id="create-result"></div>
    </div>
    
    <div>
        <h2>Step 2: Activate Membership</h2>
        <button onclick="activateMembership()">Activate Membership</button>
        <div id="activate-result"></div>
    </div>
    
    <div>
        <h2>Step 3: Check Server Logs</h2>
        <p>Check the server console for detailed debugging information.</p>
    </div>

    <script>
        let currentReference = '';
        
        async function createTestPayment() {
            currentReference = 'TEST-DEBUG-' + Date.now();
            const resultDiv = document.getElementById('create-result');
            resultDiv.innerHTML = 'Creating payment...';
            resultDiv.className = 'result';
            
            try {
                const response = await fetch('/api/payments/create-test', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reference: currentReference })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `✅ Success: ${JSON.stringify(data, null, 2)}`;
                    resultDiv.className = 'result success';
                    console.log('Payment created:', data);
                } else {
                    resultDiv.innerHTML = `❌ Error: ${JSON.stringify(data, null, 2)}`;
                    resultDiv.className = 'result error';
                }
            } catch (error) {
                resultDiv.innerHTML = `❌ Network Error: ${error.message}`;
                resultDiv.className = 'result error';
            }
        }
        
        async function activateMembership() {
            if (!currentReference) {
                alert('Please create a payment first!');
                return;
            }
            
            const resultDiv = document.getElementById('activate-result');
            resultDiv.innerHTML = 'Activating membership...';
            resultDiv.className = 'result';
            
            try {
                const response = await fetch('/api/membership/payment-success', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paymentReference: currentReference })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `✅ Success: ${JSON.stringify(data, null, 2)}`;
                    resultDiv.className = 'result success';
                } else {
                    resultDiv.innerHTML = `❌ Error: ${JSON.stringify(data, null, 2)}`;
                    resultDiv.className = 'result error';
                }
            } catch (error) {
                resultDiv.innerHTML = `❌ Network Error: ${error.message}`;
                resultDiv.className = 'result error';
            }
        }
    </script>
</body>
</html>
