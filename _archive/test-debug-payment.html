<!DOCTYPE html>
<html>
<head>
    <title>Test Payment Debug</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin: 10px 0; padding: 10px; background: #f8f9fa; border: 1px solid #dee2e6; }
        .error { background: #f8d7da; border-color: #f5c6cb; color: #721c24; }
        .success { background: #d4edda; border-color: #c3e6cb; color: #155724; }
    </style>
</head>
<body>
    <h1>Test Payment Debug</h1>
    <p>Click the button below to test the payment activation with enhanced debugging.</p>
    
    <button onclick="testPaymentActivation()">Test Payment Activation</button>
    <div id="result"></div>

    <script>
        async function testPaymentActivation() {
            const resultDiv = document.getElementById('result');
            const testRef = 'TEST-DEBUG-' + Date.now();
            
            resultDiv.innerHTML = 'Testing payment activation...';
            resultDiv.className = 'result';
            
            // First create a payment
            try {
                console.log('Creating test payment with reference:', testRef);
                const createResponse = await fetch('/api/payments/create-test', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reference: testRef })
                });
                
                const createData = await createResponse.json();
                console.log('Create payment response:', createData);
                
                if (!createResponse.ok) {
                    resultDiv.innerHTML = `❌ Create payment failed: ${JSON.stringify(createData, null, 2)}`;
                    resultDiv.className = 'result error';
                    return;
                }
                
                // Wait a moment for database to commit
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                // Now try to activate
                console.log('Activating membership for reference:', testRef);
                const activateResponse = await fetch('/api/membership/payment-success', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paymentReference: testRef })
                });
                
                const activateData = await activateResponse.json();
                console.log('Activate membership response:', activateData);
                
                if (activateResponse.ok) {
                    resultDiv.innerHTML = `✅ Success: ${JSON.stringify(activateData, null, 2)}`;
                    resultDiv.className = 'result success';
                } else {
                    resultDiv.innerHTML = `❌ Activation failed: ${JSON.stringify(activateData, null, 2)}`;
                    resultDiv.className = 'result error';
                }
                
            } catch (error) {
                console.error('Test error:', error);
                resultDiv.innerHTML = `❌ Error: ${error.message}`;
                resultDiv.className = 'result error';
            }
        }
    </script>
</body>
</html>
